name: Build LMP (.deb)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip mpv dpkg-dev

      - name: Install Python deps
        run: |
          pip3 install -r requirements.txt --user

      - name: Prepare files
        run: |
          mkdir -p pkg/usr/bin
          cp lmp.py pkg/usr/bin/lmp
          chmod +x pkg/usr/bin/lmp

      - name: Create control file (SAFE METHOD)
        run: |
          mkdir -p pkg/DEBIAN

          echo "Package: lmp" > pkg/DEBIAN/control
          echo "Version: 1.0" >> pkg/DEBIAN/control
          echo "Section: video" >> pkg/DEBIAN/control
          echo "Priority: optional" >> pkg/DEBIAN/control
          echo "Architecture: all" >> pkg/DEBIAN/control
          echo "Depends: python3, mpv" >> pkg/DEBIAN/control
          echo "Maintainer: LMP Dev" >> pkg/DEBIAN/control
          echo "Description: LMP (Linux Media Player)" >> pkg/DEBIAN/control

      - name: Build package
        run: dpkg-deb --build pkg lmp.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lmp-deb
          path: lmp.deb
