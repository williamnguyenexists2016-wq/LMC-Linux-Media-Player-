name: Build LMP (.deb)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip mpv dpkg-dev

      - name: Install Python dependencies
        run: |
          pip3 install -r requirements.txt --user

      - name: Prepare package structure
        run: |
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/DEBIAN

      - name: Install LMP binary
        run: |
          install -Dm755 lmp.py pkg/usr/bin/lmp

      - name: Create desktop entry (Sound & Video)
        run: |
          cat <<EOF > pkg/usr/share/applications/lmp.desktop
[Desktop Entry]
Name=LMP (Linux Media Player)
Comment=Simple Media Player
Exec=lmp
Icon=video-x-generic
Terminal=false
Type=Application
Categories=AudioVideo;Player;
EOF

      - name: Create Debian control file
        run: |
          cat <<EOF > pkg/DEBIAN/control
Package: lmp
Version: 1.0
Section: video
Priority: optional
Architecture: all
Depends: python3, mpv
Maintainer: LMP Dev
Description: LMP (Linux Media Player)
EOF

      - name: Build .deb package
        run: dpkg-deb --build pkg lmp.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lmp-deb
          path: lmp.deb
