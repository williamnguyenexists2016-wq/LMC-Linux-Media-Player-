name: Build LMC Packages

on:
  push:
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip mpv dpkg-dev

      - name: Install Python packages
        run: |
          pip3 install -r requirements.txt --user

      - name: Prepare DEB folder
        run: |
          mkdir -p build/usr/bin
          cp lmc.py build/usr/bin/lmc
          chmod +x build/usr/bin/lmc

      - name: Create DEBIAN control file
        run: |
          mkdir -p build/DEBIAN
          cat <<EOF > build/DEBIAN/control
Package: lmc
Version: 1.0
Section: video
Priority: optional
Architecture: all
Depends: python3, mpv
Maintainer: LMC Dev
Description: Linux Media Player (LMC)
EOF

      - name: Build DEB package
        run: dpkg-deb --build build lmc.deb

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: lmc-deb
          path: lmc.deb
